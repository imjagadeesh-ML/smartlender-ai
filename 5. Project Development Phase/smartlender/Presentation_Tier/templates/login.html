<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLender AI - Login</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="background-decor animate-bg"></div>
    <div class="auth-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">✦</span> SmartLender AI
            </div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Please sign in to access the predictive evaluation dashboard.</p>
        </header>

        <!-- Login Card -->
        <main class="card auth-card">
            <div id="alertBox" class="alert-box hidden"></div>
            
            <form id="loginForm" autocomplete="off">
                <div class="form-grid single-column">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>New to SmartLender AI? <a href="/register" class="auth-link">Create an account</a></p>
            </div>
        </main>
    </div>

    <!-- Login Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const submitBtn = document.getElementById('loginBtn');
            const btnText = submitBtn.querySelector('.btn-text');
            const spinner = submitBtn.querySelector('.spinner');
            const alertBox = document.getElementById('alertBox');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Clear previous alerts
                alertBox.classList.add('hidden');
                alertBox.textContent = '';
                alertBox.className = 'alert-box hidden';

                // Loading State
                submitBtn.disabled = true;
                btnText.textContent = 'Authenticating...';
                spinner.classList.remove('hidden');

                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        // Success Redirect
                        alertBox.textContent = 'Login successful! Redirecting...';
                        alertBox.className = 'alert-box alert-success';
                        alertBox.classList.remove('hidden');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 800);
                    } else {
                        // Error message
                        alertBox.textContent = data.detail || 'Invalid username or password.';
                        alertBox.className = 'alert-box alert-error';
                        alertBox.classList.remove('hidden');
                        submitBtn.disabled = false;
                        btnText.textContent = 'Sign In';
                        spinner.classList.add('hidden');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    alertBox.textContent = 'A system error occurred. Please check backend connection.';
                    alertBox.className = 'alert-box alert-error';
                    alertBox.classList.remove('hidden');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Sign In';
                    spinner.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
